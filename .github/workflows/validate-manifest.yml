name: Validate Manifest

on:
  workflow_call:
    inputs:
      manifest_path:
        required: false
        type: string
        default: ./manifest.yml
      manifest_schema_url:
        required: false
        type: string
        default: ''
      schema_base_url:
        required: false
        type: string
        default: https://raw.githubusercontent.com/DockyardMods/the-dockyard/main/schemas
      tooling_ref:
        required: false
        type: string
        default: main

jobs:
  validate-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out target repo
        uses: actions/checkout@v4

      - name: Check out tooling repo
        uses: actions/checkout@v4
        with:
          repository: DockyardMods/dockyard-tooling
          ref: ${{ inputs.tooling_ref }}
          path: tooling

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install tooling dependencies
        working-directory: tooling
        run: bun install --frozen-lockfile

      - name: Generate types
        working-directory: tooling
        env:
          DOCKYARD_SCHEMA_BASE: ${{ inputs.schema_base_url }}
        run: bun run generate-types

      - name: Validate manifest schema
        if: ${{ inputs.manifest_schema_url != '' }}
        run: bun run tooling/src/cli/validate-manifest-schema.ts "${{ inputs.manifest_path }}" "${{ inputs.manifest_schema_url }}"

      - name: Validate manifest schema from $schema
        if: ${{ inputs.manifest_schema_url == '' }}
        run: bun run tooling/src/cli/validate-manifest-schema.ts "${{ inputs.manifest_path }}"

      - name: Validate manifest content
        run: bun run tooling/src/cli/validate-manifest-content.ts "${{ inputs.manifest_path }}"
